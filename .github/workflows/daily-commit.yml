name: Daily Auto Commit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update file
        run: echo "Updated at $(date)" >> log.txt

      - name: Commit changes - 23f1000576@ds.study.iitm.ac.in
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add log.txt
          git commit -m "Daily auto commit" || echo "No changes"
          git push
